name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform: [ Win32, x64 ]   # 32-bit and 64-bit foobar2000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # ---- Build the vendored SDK static libs for this platform ----
      - name: Build foobar2000_SDK
        run: msbuild lib\foobar_sdk\foobar2000\SDK\foobar2000_SDK.vcxproj /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143

      - name: Build pfc
        run: msbuild lib\foobar_sdk\pfc\pfc.vcxproj /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143

      - name: Build foobar2000_component_client
        run: msbuild lib\foobar_sdk\foobar2000\foobar2000_component_client\foobar2000_component_client.vcxproj /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143

      # ---- Build the component ----
      - name: Build foo_strip
        run: msbuild foo_strip.vcxproj /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143

      # ---- Upload this platform's DLL as an artifact ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: foo_strip-${{ matrix.platform }}
          path: bin\${{ matrix.platform }}\Release\foo_strip.dll
          if-no-files-found: error

  # ---- On version tags: gather both DLLs, package, and release ----
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-2022
    steps:
      - name: Download Win32 DLL
        uses: actions/download-artifact@v4
        with:
          name: foo_strip-Win32
          path: dist/win32

      - name: Download x64 DLL
        uses: actions/download-artifact@v4
        with:
          name: foo_strip-x64
          path: dist/x64

      # foobar2000 loads the architecture-appropriate DLL from a component
      # package. Convention: 32-bit = foo_strip.dll, 64-bit = foo_strip-x64.dll,
      # both inside the same .fb2k-component (a zip).
      - name: Assemble component package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg | Out-Null
          Copy-Item dist/win32/foo_strip.dll pkg/foo_strip.dll
          Copy-Item dist/x64/foo_strip.dll   pkg/foo_strip-x64.dll
          Compress-Archive -Path pkg/* -DestinationPath foo_strip.fb2k-component
          # Also expose the raw DLLs with architecture-tagged names for the release.
          Copy-Item dist/win32/foo_strip.dll foo_strip-Win32.dll
          Copy-Item dist/x64/foo_strip.dll   foo_strip-x64.dll

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            foo_strip.fb2k-component
            foo_strip-Win32.dll
            foo_strip-x64.dll
